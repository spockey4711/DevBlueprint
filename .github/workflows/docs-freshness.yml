name: Docs freshness

# Periodic "does the beginner path still match the CLI?" pass (P15-4). Unlike the
# per-push docs-check (P14-4), this actually runs the documented getting-started
# flow - scaffold, setup.sh, doctor, make check - and confirms the guide's quoted
# transcripts and version stamps still match what the CLI prints. scripts/docs-
# freshness.sh is the engine.
#
# It runs weekly so the beginner path cannot drift silently between releases, on
# demand, and on pull requests that touch the CLI, the generic variant or the
# guide itself (a path filter keeps it off unrelated PRs, since it is heavier
# than a lint).

on:
  schedule:
    # Mondays at 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - bin/devblueprint
      - variants/generic/**
      - GETTING-STARTED.md
      - i18n/de/GETTING-STARTED.md
      - VERSION
      - scripts/docs-freshness.sh
      - .github/workflows/docs-freshness.yml

permissions:
  contents: read

jobs:
  docs-freshness:
    name: Documented getting-started flow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run the documented flow against the CLI
        run: scripts/docs-freshness.sh
