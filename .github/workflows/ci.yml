name: CI

# DevBlueprint is a documentation-first kit of bash scripts. CI shellchecks the
# CLI and the worktree script so a broken script never ships.

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck bin/devblueprint scripts/wt.sh variants/*/setup.sh
