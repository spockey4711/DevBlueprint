name: CI

# The quality gate for every change: ruff (lint + format), nbqa (lint notebooks),
# mypy (types on the library code), pytest. Must be green before a PR can merge.
# Gates both integration branches: feature PRs into `develop` and the periodic
# `develop` -> `master` release PR.

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint notebooks
        run: uv run nbqa ruff notebooks

      - name: Assert notebooks carry no output
        run: |
          notebooks=$(git ls-files '*.ipynb')
          [ -z "$notebooks" ] && { echo "No notebooks to check"; exit 0; }
          uv run nbstripout --verify $notebooks \
            || { echo "Notebooks contain output - run nbstripout before committing"; exit 1; }

      - name: Typecheck
        run: uv run mypy src

      - name: Tests
        run: uv run pytest
