# wt.conf - worktree config for a data-science Python/uv project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert exp"

# Sync the virtualenv in a freshly created worktree so it is immediately usable.
# Swap for `python -m venv .venv && .venv/bin/pip install -e '.[dev]'` if not on uv.
wt_post_create() {
  ( cd "$1" && command -v uv >/dev/null 2>&1 && uv sync || true )
}
