# wt.conf - worktree config for a SvelteKit/pnpm project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Install dependencies in a freshly created worktree so it is immediately usable.
# No-op before the app is scaffolded (no package.json) or without pnpm on PATH.
wt_post_create() {
  ( cd "$1" && command -v pnpm >/dev/null 2>&1 && [ -f package.json ] \
      && pnpm install --prefer-offline >/dev/null 2>&1 || true )
}
