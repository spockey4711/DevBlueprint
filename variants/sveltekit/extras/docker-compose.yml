# Run the SvelteKit app in a container locally, close to how it runs in
# production but wired for development. `docker compose up --build` builds the
# Dockerfile in this directory and starts the app on port 3000.
#
# Secrets come from a local .env (gitignored) via env_file - never hard-code them
# here. Need a database too? Uncomment the `db` service and the app's depends_on
# below to wait on it.
services:
  app:
    build: .
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: unless-stopped
