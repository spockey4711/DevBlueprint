# wt.conf - worktree config for a Node/Express/TypeScript project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Install dependencies in a freshly created worktree so it is immediately usable.
wt_post_create() {
  ( cd "$1" && command -v npm >/dev/null 2>&1 && npm install --prefer-offline --no-audit --no-fund || true )
}
