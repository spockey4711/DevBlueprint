name: CI

# The quality gate for every change: ESLint (lint), tsc (types), vitest (tests),
# and the tsc build. Runs the same four gates as
# `npm run lint && npm run typecheck && npm test && npm run build`. Must be green
# before a PR can merge. Gates both integration branches: feature PRs into
# `develop` and the periodic `develop` -> `master` release PR.

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

# Only the latest run per branch/PR matters; cancel superseded runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
