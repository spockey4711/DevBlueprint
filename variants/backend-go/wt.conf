# wt.conf - worktree config for a Go backend project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Warm the module cache in a freshly created worktree so it is immediately usable
# (build + test do not stall on a cold download).
wt_post_create() {
  ( cd "$1" && command -v go >/dev/null 2>&1 && go mod download || true )
}
