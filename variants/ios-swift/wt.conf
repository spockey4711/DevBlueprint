# wt.conf - worktree config for a Swift/Xcode project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Resolve Swift Package dependencies in a freshly created worktree if the tooling
# is present. No-op when neither swift nor xcodebuild is available (e.g. CI Linux).
wt_post_create() {
  ( cd "$1" && command -v swift >/dev/null 2>&1 && swift package resolve || true )
}
