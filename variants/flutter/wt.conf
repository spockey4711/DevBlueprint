# wt.conf - worktree config for a Flutter/Dart project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Fetch packages in a freshly created worktree so it is immediately buildable.
# Each worktree is a separate checkout, so it needs its own `flutter pub get`.
wt_post_create() {
  ( cd "$1" && command -v flutter >/dev/null 2>&1 && flutter pub get || true )
}
