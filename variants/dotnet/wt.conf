# wt.conf - worktree config for a C# / .NET project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Warm the NuGet cache in a freshly created worktree so the first real build is
# fast. No-op when the SDK is not installed yet or there is no project to restore
# (e.g. before `dotnet new` has scaffolded the solution).
wt_post_create() {
  ( cd "$1" && command -v dotnet >/dev/null 2>&1 && dotnet restore >/dev/null 2>&1 || true )
}
