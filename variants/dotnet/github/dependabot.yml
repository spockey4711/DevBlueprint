# Dependency automation. Dependabot opens PRs for outdated dependencies so the
# quality gate (not a human's memory) keeps the toolchain current. Grouped to
# avoid a flood of single-package PRs.
version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      microsoft:
        patterns: ["Microsoft.*", "System.*"]
      test:
        patterns: ["xunit*", "*.TestAdapter", "coverlet*", "Moq", "FluentAssertions"]
      other:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
