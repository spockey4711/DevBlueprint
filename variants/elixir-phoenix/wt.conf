# wt.conf - worktree config for an Elixir / Phoenix project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Warm the Hex/deps cache in a freshly created worktree so the first real gate is
# fast. No-op when mix is not installed yet or there is no mix.exs to fetch from
# (e.g. before `mix phx.new` has scaffolded the app).
wt_post_create() {
  ( cd "$1" && command -v mix >/dev/null 2>&1 && [ -f mix.exs ] \
      && mix deps.get >/dev/null 2>&1 || true )
}
