# Run the Phoenix app in a container locally, close to how it runs in production
# but wired for development. `docker compose up --build` builds the Dockerfile in
# this directory and starts the app on port 4000.
#
# Secrets come from a local .env (gitignored) via env_file - never hard-code them
# here. Phoenix needs a DATABASE_URL and SECRET_KEY_BASE (mix phx.gen.secret) even
# to boot the release; the `postgres` flavor ships a ready db service
# (`devblueprint init ... --flavor postgres`) - uncomment depends_on and the db
# service below to wait on it.
services:
  app:
    build: .
    env_file:
      - .env
    environment:
      MIX_ENV: prod
      PHX_SERVER: "true"
    ports:
      - "4000:4000"
    restart: unless-stopped
