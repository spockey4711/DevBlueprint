name: CI

# The quality gate for every change: mix format (formatting), Credo (style +
# consistency), Dialyzer (success-typing static analysis) and the ExUnit tests -
# all on the Hex dependencies pinned in mix.lock. Must be green before a PR can
# merge. Gates both integration branches: feature PRs into `develop` and the
# periodic `develop` -> `master` release PR.

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MIX_ENV: test

jobs:
  quality:
    name: Format, lint, static analysis, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate env schema
        run: sh scripts/check-env.sh

      - name: Set up BEAM (Erlang + Elixir)
        uses: erlef/setup-beam@v1
        with:
          # Keep these aligned with .tool-versions and the mix.exs constraint.
          otp-version: "27"
          elixir-version: "1.18"

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: Install dependencies
        run: |
          mix deps.get
          mix deps.compile

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Format check
        run: mix format --check-formatted

      - name: Lint (Credo)
        run: mix credo --strict

      # Dialyzer's PLT is expensive to build, so cache it keyed on the toolchain
      # and lockfile and rebuild only when either changes.
      - name: Cache Dialyzer PLT
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plt-${{ runner.os }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: plt-${{ runner.os }}-

      - name: Static analysis (Dialyzer)
        run: mix dialyzer --format github

      - name: Tests
        run: mix test
