name: Security

# Security-gate baseline that runs alongside the language quality gate in ci.yml:
# secret scanning (gitleaks), static analysis (semgrep), dependency-vulnerability
# review on PRs, and - for this IaC stack - a Trivy misconfiguration scan of the
# Terraform. Gates both integration branches: feature PRs into `develop` and the
# `develop` -> `master` release PR.

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so a push scan covers every new commit, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Personal repos need no license. Organizations must provide an org-wide
          # GITLEAKS_LICENSE secret - see https://gitleaks.io.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  semgrep:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run semgrep
        # No SEMGREP_APP_TOKEN: run the curated rule packs locally instead of the
        # hosted platform. Tune coverage via SEMGREP_RULES or a committed semgrep.yml.
        run: semgrep ci
        env:
          SEMGREP_RULES: "p/default p/security-audit p/secrets p/terraform"

  iac-scan:
    name: IaC misconfig scan (Trivy)
    runs-on: ubuntu-latest
    # The core IaC security control: Trivy scans the Terraform for insecure
    # defaults (public buckets, open security groups, unencrypted storage) before
    # they ever reach an apply. Fails the gate on HIGH/CRITICAL.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          # Fail the job (not just report) when a HIGH/CRITICAL misconfig is found.
          exit-code: "1"

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # dependency-review-action diffs a PR's dependency manifest, so it is
    # pull_request-only. Needs the dependency graph (on by default for public
    # repos; private repos require GitHub Advanced Security).
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          # Block a PR that introduces a moderate-or-higher known advisory.
          fail-on-severity: moderate
