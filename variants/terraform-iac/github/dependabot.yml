# Dependency automation. Dependabot opens PRs for outdated provider/module
# constraints and workflow actions so the quality gate (not a human's memory)
# keeps the toolchain current. Grouped to avoid a flood of single-package PRs.
version: 2
updates:
  - package-ecosystem: terraform
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      terraform:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
