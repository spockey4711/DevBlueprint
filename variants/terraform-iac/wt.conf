# wt.conf - worktree config for a Terraform IaC project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Warm the provider/module cache in a freshly created worktree so the first real
# gate is fast. `terraform init -backend=false` installs providers and modules
# without touching remote state. No-op when terraform is not installed yet or
# there is no root configuration to initialize.
wt_post_create() {
  ( cd "$1" && command -v terraform >/dev/null 2>&1 && ls ./*.tf >/dev/null 2>&1 \
      && terraform init -backend=false -input=false >/dev/null 2>&1 || true )
}
