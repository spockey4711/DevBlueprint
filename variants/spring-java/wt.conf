# wt.conf - worktree config for a Java + Spring Boot (Gradle) project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Warm the Gradle cache and fetch the wrapper distribution in a freshly created
# worktree so the first real build is fast. No-op when the wrapper is not present
# yet (e.g. before the Spring Boot project has been created).
wt_post_create() {
  ( cd "$1" && [ -x ./gradlew ] && ./gradlew --quiet help >/dev/null 2>&1 || true )
}
