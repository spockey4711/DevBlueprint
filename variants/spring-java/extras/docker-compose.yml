# Run the service in a container locally, close to how it runs in production but
# wired for development. `docker compose up --build` builds the Dockerfile in this
# directory and starts the app on port 8080.
#
# Secrets come from a local .env (gitignored) via env_file - never hard-code them
# here. Need a database too? Uncomment the `postgres` service and the depends_on
# below to wait on it, and point SPRING_DATASOURCE_URL at it in your .env.
services:
  app:
    build: .
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: development
    ports:
      - "8080:8080"
    restart: unless-stopped
