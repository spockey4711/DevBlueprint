# Render Blueprint (skeleton) - https://render.com/docs/blueprint-spec
# Commit this, connect the repo in Render, and it provisions the service from the
# repo's Dockerfile. Set real secrets in the Render dashboard (or keep `sync: false`
# below so Render prompts for them) - never commit them here. See docs/ops/deployment.md.
services:
  - type: web
    name: <your-app-name>
    runtime: docker            # or the native `java` runtime if you prefer no Dockerfile
    dockerfilePath: ./Dockerfile
    healthCheckPath: <health-check-path>   # e.g. /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: SERVER_PORT
        value: "8080"
      - key: SPRING_DATASOURCE_URL      # managed - set it in the dashboard, not here
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD # secret - set it in the dashboard, not here
        sync: false
