name: CI

# The quality gate for every change: the env-schema contract, Spotless (format
# check), Checkstyle (static analysis on main + test sources), and the JUnit tests
# - all through the Gradle wrapper. Must be green before a PR can merge. Gates both
# integration branches: feature PRs into `develop` and the periodic `develop` ->
# `master` release PR.

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format, static analysis, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fast, toolchain-free contract check: .env.example must stay in lockstep
      # with .env.schema (and a real .env, if present, must satisfy it).
      - name: Validate env schema
        run: sh scripts/check-env.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Format check (Spotless)
        run: ./gradlew spotlessCheck

      - name: Static analysis (Checkstyle)
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Tests
        run: ./gradlew test
