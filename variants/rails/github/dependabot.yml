# Dependency automation. Dependabot opens PRs for outdated dependencies so the
# quality gate (not a human's memory) keeps the toolchain current. Grouped to
# avoid a flood of single-package PRs.
version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rails:
        patterns: ["rails", "actioncable", "actionmailer", "actionpack", "actionview", "activejob", "activemodel", "activerecord", "activestorage", "activesupport", "railties"]
      dev:
        patterns: ["rubocop*", "brakeman", "debug"]
      other:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
