# Run the Rails app in a container locally, close to how it runs in production but
# wired for development. `docker compose up --build` builds the Dockerfile in this
# directory and starts the app on port 3000.
#
# Secrets come from a local .env (gitignored) via env_file - never hard-code them
# here. Need a database or Redis too? Uncomment the commented services below and
# the matching depends_on, then point DATABASE_URL / REDIS_URL at them in .env.
services:
  app:
    build: .
    env_file:
      - .env
    environment:
      RAILS_ENV: development
    ports:
      - "3000:3000"
    restart: unless-stopped
