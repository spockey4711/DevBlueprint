# wt.conf - worktree config for a Ruby on Rails project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Install gems in a freshly created worktree so the first real run is fast. No-op
# when Bundler is not installed yet or there is no Gemfile (e.g. before
# `rails new` has scaffolded the app).
wt_post_create() {
  ( cd "$1" && command -v bundle >/dev/null 2>&1 && [ -f Gemfile ] && bundle install >/dev/null 2>&1 || true )
}
