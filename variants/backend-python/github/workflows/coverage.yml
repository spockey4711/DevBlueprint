name: Coverage

# Measures line coverage on every change and enforces a soft floor. The floor is
# read from the COVERAGE_MIN repository variable (Settings > Secrets and variables
# > Actions > Variables) and defaults to 0, i.e. report-only: coverage is always
# visible in the job summary, and a team opts into a hard gate by raising
# COVERAGE_MIN - no code change needed. This respects the variant's
# "meaningful coverage, not a global percentage" guidance in
# docs/engineering/quality-and-testing.md.

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: Line coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Test with coverage
        # pytest-cov is pulled in ephemerally so the floor works without editing the
        # project's dependencies. --cov-fail-under=0 (the default) never fails.
        env:
          MIN: ${{ vars.COVERAGE_MIN || '0' }}
        run: |
          uv run --with pytest-cov pytest \
            --cov=app --cov-report=term-missing --cov-report=xml \
            --cov-fail-under="$MIN"

      - name: Coverage summary
        if: always()
        run: |
          [ -f coverage.xml ] || exit 0
          pct=$(uv run python -c "import xml.etree.ElementTree as E; print(round(float(E.parse('coverage.xml').getroot().get('line-rate')) * 100, 2))")
          printf '### Coverage\n\nLine coverage **%s%%**.\n' "$pct" >> "$GITHUB_STEP_SUMMARY"
