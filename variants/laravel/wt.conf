# wt.conf - worktree config for a PHP / Laravel project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Warm the Composer cache in a freshly created worktree so the first real gate is
# fast. No-op when Composer is not installed yet or there is no composer.json to
# install from (e.g. before `composer create-project` has scaffolded the app).
wt_post_create() {
  ( cd "$1" && command -v composer >/dev/null 2>&1 && [ -f composer.json ] \
      && composer install --no-interaction --quiet >/dev/null 2>&1 || true )
}
