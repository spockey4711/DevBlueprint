name: CI

# The quality gate for every change: Laravel Pint (formatting + code style),
# PHPStan/Larastan (static analysis), and the Pest tests - all on the Composer
# dependencies pinned in composer.lock. Must be green before a PR can merge.
# Gates both integration branches: feature PRs into `develop` and the periodic
# `develop` -> `master` release PR.

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Format, static analysis, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Format check (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse

      - name: Tests
        run: vendor/bin/pest
