# Render Blueprint (skeleton) - https://render.com/docs/blueprint-spec
# Commit this, connect the repo in Render, and it provisions the service from the
# repo's Dockerfile. Set real secrets (APP_KEY, DB_PASSWORD, ...) in the Render
# dashboard (or keep `sync: false` below so Render prompts for them) - never commit
# them here. See docs/ops/deployment.md.
services:
  - type: web
    name: <your-app-name>
    runtime: docker            # or the native `php` runtime if you prefer no Dockerfile
    dockerfilePath: ./Dockerfile
    healthCheckPath: <health-check-path>   # e.g. /up (Laravel's built-in health route)
    autoDeploy: true
    # Run migrations and cache config once per deploy, before traffic shifts.
    preDeployCommand: "<pre-deploy-command>"   # e.g. php artisan migrate --force
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY           # secret - set it in the dashboard, not here
        sync: false
      - key: DATABASE_URL      # secret/managed - set it in the dashboard, not here
        sync: false
