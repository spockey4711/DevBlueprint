# Dependency automation. Dependabot opens PRs for outdated dependencies so the
# quality gate (not a human's memory) keeps the toolchain current. Grouped to
# avoid a flood of single-package PRs.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
