name: Coverage

# Measures line coverage on every change and enforces a soft floor. The floor is
# read from the COVERAGE_MIN repository variable (Settings > Secrets and variables
# > Actions > Variables) and defaults to 0, i.e. report-only: coverage is always
# visible in the job summary, and a team opts into a hard gate by raising
# COVERAGE_MIN - no code change needed. This respects the variant's
# "meaningful coverage, not a global percentage" guidance in
# docs/engineering/quality-and-testing.md.

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: Line coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test with coverage
        # --fail-under-lines defaults to the COVERAGE_MIN repo variable (0 = off).
        env:
          MIN: ${{ vars.COVERAGE_MIN || '0' }}
        run: cargo llvm-cov --all-features --workspace --summary-only --fail-under-lines "$MIN"
