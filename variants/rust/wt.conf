# wt.conf - worktree config for a Rust/cargo project. Sourced by scripts/wt.sh.
MAIN_BRANCH="master"
BASE_BRANCH="develop"
ALLOWED_TYPES="feat fix docs style refactor perf test build ci chore revert"

# Warm the cargo registry/cache in a freshly created worktree so the first build
# is fast. Cheap and offline-safe once the deps are cached.
wt_post_create() {
  ( cd "$1" && command -v cargo >/dev/null 2>&1 && cargo fetch || true )
}
