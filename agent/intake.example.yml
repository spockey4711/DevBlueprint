# DevBlueprint intake file (.devblueprint-intake.yml)
#
# A reproducible record of the answers `devblueprint init` needs. An agent writes
# one of these from a setup interview or a PRD, previews it with
#   devblueprint plan   --target <dir> --from .devblueprint-intake.yml
# and, once confirmed, applies it with
#   devblueprint init   --target <dir> --from .devblueprint-intake.yml
#
# The format is a flat map of `key: value` pairs - not general YAML. Blank lines
# and `#` comments (whole-line or trailing) are ignored. Values may be quoted.
# Explicit CLI flags override the matching key, so a conversation can revise one
# answer without rewriting the file (e.g. `init --from ... --base master`).
#
# --target is NOT a key: it says *where* to scaffold, not *what*, so it stays a
# CLI argument. Every key below is optional; omit one to take init's default.
# Full reference: docs/agent/intake-schema.md.

# Human-facing project name. Fills {{PROJECT_NAME}} in CLAUDE.md and friends.
# Default: the --target directory's basename.
name: my-project

# Stack variant to scaffold. Must match a `devblueprint list` slug. Required in
# practice - init has no default variant.
variant: generic

# Git branch names. main is the always-deployable branch; base is where feature
# work integrates. Setting base == main selects the single-branch (trunk) flow.
# Defaults: main=master, base=develop.
main: master
base: develop

# Opt into the community-health files (SECURITY.md + CODE_OF_CONDUCT.md).
# true/false (also yes/no, on/off, 1/0). Default: false.
community: false

# Reporting address stamped into the community-health files. Only meaningful with
# community: true. Default: a visible "INSERT CONTACT METHOD" placeholder.
contact: security@example.com

# Intended deploy target (e.g. vercel, fly, docker, none). Recorded and echoed by
# init/plan; the matching deploy runbook is generated by a later wave. Optional.
deploy: none
